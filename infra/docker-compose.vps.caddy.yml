services:
  caddy:
    image: caddy:2.8-alpine
    container_name: aura-caddy
    restart: unless-stopped
    depends_on:
      - aura-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
