services:
  aura-api:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    container_name: aura-api
    restart: unless-stopped
    env_file:
      - ../server/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
